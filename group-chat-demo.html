<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.ably.com/lib/ably.min-2.js"></script>
<script src="https://cdn.ably.com/lib/ably-chat.umd.cjs-0.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0d12;
  --panel: #0e1218;
  --sidebar: #111820;
  --card: #141a24;
  --border: #1e2a3c;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --text: #b8c6d8;
  --text-dim: #5c6e84;
  --text-bright: #e2ecf8;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ── Name picker overlay ── */
.name-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
}
.name-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 36px;
  text-align: center;
  max-width: 360px; width: 100%;
  animation: fadeUp 0.2s ease-out;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.name-card h2 {
  color: var(--text-bright); font-size: 18px; margin-bottom: 4px;
}
.name-card p {
  color: var(--text-dim); font-size: 13px; margin-bottom: 24px; line-height: 1.5;
}
.name-card input {
  width: 100%; padding: 12px 16px;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text-bright);
  font-size: 15px; outline: none;
  transition: border-color 0.15s;
}
.name-card input:focus { border-color: var(--accent); }
.name-card button {
  width: 100%; margin-top: 12px; padding: 12px;
  background: var(--accent); border: none; border-radius: 10px;
  color: white; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
}
.name-card button:hover { background: var(--accent-hover); }

/* ── Main layout ── */
.app {
  display: none; height: 100vh;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 1fr;
}
.app.active { display: grid; }

/* ── Sidebar ── */
.sidebar {
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.sidebar-title {
  font-size: 14px; font-weight: 700; color: var(--text-bright);
  flex: 1;
}
.sidebar-user {
  font-size: 11px; color: var(--text-dim);
  background: var(--card); border: 1px solid var(--border);
  padding: 3px 10px; border-radius: 20px;
  max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.room-section {
  padding: 14px 12px 8px;
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-dim);
}
.room-list {
  flex: 1; overflow-y: auto;
  padding: 0 8px 12px;
}
.room-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-dim);
  font-size: 14px; font-weight: 500;
  transition: background 0.12s, color 0.12s;
  position: relative;
}
.room-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.room-item.active {
  background: rgba(99,102,241,0.12);
  color: var(--text-bright);
}
.room-item .room-hash {
  font-size: 16px; font-weight: 700; opacity: 0.5;
  width: 20px; text-align: center; flex-shrink: 0;
}
.room-item.active .room-hash { opacity: 0.8; color: var(--accent); }
.room-item .room-unread {
  margin-left: auto;
  min-width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 9px;
  font-size: 10px; font-weight: 700; color: white;
  display: none; align-items: center; justify-content: center;
  padding: 0 5px;
}
.room-item .room-unread.show { display: flex; }

/* Presence list in sidebar */
.presence-section {
  border-top: 1px solid var(--border);
  padding: 12px;
}
.presence-header {
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.presence-list { display: flex; flex-direction: column; gap: 2px; }
.presence-user {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px; border-radius: 6px;
  font-size: 13px; color: var(--text);
}
.presence-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
}

/* ── Chat panel ── */
.chat-panel {
  display: flex; flex-direction: column;
  background: var(--panel);
  overflow: hidden;
}
.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.chat-header-hash {
  font-size: 20px; font-weight: 700; color: var(--accent); opacity: 0.6;
}
.chat-header-name {
  font-size: 15px; font-weight: 700; color: var(--text-bright);
}
.chat-header-desc {
  font-size: 12px; color: var(--text-dim); margin-left: 10px;
  border-left: 1px solid var(--border); padding-left: 10px;
}
.chat-header-spacer { flex: 1; }
.chat-header-btn {
  padding: 5px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text-dim); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: color 0.12s, border-color 0.12s, background 0.12s;
  white-space: nowrap;
}
.chat-header-btn:hover {
  color: var(--text-bright); border-color: var(--text-dim);
}
.chat-header-btn.generate:hover {
  color: var(--accent); border-color: var(--accent);
}
.chat-header-btn.clear:hover {
  color: var(--red); border-color: var(--red);
}

.messages {
  flex: 1; overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column; gap: 4px;
  justify-content: flex-end;
}

/* Messages: grouped by author */
.msg-group {
  display: flex; gap: 12px;
  padding: 4px 0;
  animation: msgIn 0.15s ease-out;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-group + .msg-group { margin-top: 0; }
.msg-group.new-author { margin-top: 12px; }

.msg-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: white;
  flex-shrink: 0; margin-top: 2px;
}
.msg-avatar.hidden { visibility: hidden; width: 36px; }

.msg-body { min-width: 0; flex: 1; }
.msg-author-row {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 2px;
}
.msg-author {
  font-size: 14px; font-weight: 600; color: var(--text-bright);
}
.msg-time {
  font-size: 11px; color: var(--text-dim);
}
.msg-text {
  font-size: 14px; line-height: 1.55;
  color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}

/* ── Message action bar (hover toolbar) ── */
.msg-body { position: relative; }
.msg-action-bar {
  position: absolute; top: -6px; right: 0;
  display: flex; gap: 1px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 2px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  opacity: 0; pointer-events: none;
  transition: opacity 0.12s;
  z-index: 10;
}
.msg-group:hover .msg-action-bar {
  opacity: 1; pointer-events: auto;
}
.msg-action-btn {
  width: 30px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; border-radius: 6px;
  cursor: pointer; color: var(--text-dim);
  font-size: 16px; position: relative;
  transition: background 0.1s, color 0.1s;
}
.msg-action-btn:hover {
  background: rgba(255,255,255,0.08); color: var(--text-bright);
}
.msg-action-btn[title]:hover::after {
  content: attr(title);
  position: absolute; bottom: 100%; left: 50%;
  transform: translateX(-50%);
  margin-bottom: 6px; white-space: nowrap;
  background: #1a1f2e; color: var(--text-bright);
  font-size: 11px; font-weight: 600;
  padding: 4px 8px; border-radius: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  pointer-events: none;
}

/* Reaction picker (opens above action bar) */
.reaction-picker {
  position: absolute; bottom: 100%; right: 0;
  margin-bottom: 4px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px 6px;
  display: none; gap: 2px; align-items: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  z-index: 20;
}
.reaction-picker.open { display: flex; }
.reaction-picker button {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  background: none; border: none; border-radius: 6px;
  font-size: 18px; cursor: pointer;
  transition: background 0.1s, transform 0.1s;
}
.reaction-picker button:hover {
  background: rgba(255,255,255,0.08);
  transform: scale(1.2);
}

/* Reaction pills below message */
.msg-reactions {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-top: 4px;
}
.msg-reactions:empty { display: none; }
.reaction-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px 2px 6px;
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.15);
  border-radius: 12px;
  font-size: 13px; cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
  user-select: none;
}
.reaction-pill:hover {
  background: rgba(99,102,241,0.15);
  border-color: rgba(99,102,241,0.3);
}
.reaction-pill.mine {
  background: rgba(99,102,241,0.18);
  border-color: rgba(99,102,241,0.4);
}
.reaction-pill .r-emoji { font-size: 15px; }
.reaction-pill .r-count {
  font-size: 11px; font-weight: 600; color: var(--text-dim);
  min-width: 6px; text-align: center;
}
.reaction-pill.mine .r-count { color: var(--accent); }

/* ── Thread summary + inline thread ── */
.thread-summary {
  display: none; align-items: center; gap: 6px;
  margin-top: 6px; padding: 4px 8px;
  border-radius: 8px; cursor: pointer;
  font-size: 12px; color: var(--accent);
  font-weight: 600;
  transition: background 0.12s;
}
.thread-summary:hover { background: rgba(99,102,241,0.08); }
.thread-summary.has-replies { display: flex; }
.thread-summary .thread-count { }
.thread-summary .thread-last {
  color: var(--text-dim); font-weight: 400;
}
.thread-summary .thread-chevron {
  margin-left: auto; font-size: 10px; color: var(--text-dim);
  transition: transform 0.15s;
}
.thread-summary.expanded .thread-chevron { transform: rotate(180deg); }

.thread-container {
  display: none; margin-top: 6px;
  border-left: 2px solid var(--accent);
  margin-left: 4px; padding-left: 14px;
  padding-bottom: 4px;
}
.thread-container.open { display: block; }

.thread-reply {
  display: flex; gap: 8px; padding: 4px 0;
  animation: msgIn 0.12s ease-out;
}
.thread-reply-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: white;
  flex-shrink: 0; margin-top: 2px;
}
.thread-reply-body { min-width: 0; flex: 1; }
.thread-reply-author {
  font-size: 12px; font-weight: 600; color: var(--text-bright);
}
.thread-reply-time {
  font-size: 10px; color: var(--text-dim); margin-left: 6px;
}
.thread-reply-text {
  font-size: 13px; line-height: 1.45; color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}

.thread-input-bar {
  display: flex; gap: 6px; align-items: center;
  margin-top: 6px;
}
.thread-input-bar input {
  flex: 1; padding: 6px 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-bright);
  font-family: inherit; font-size: 13px;
  outline: none; transition: border-color 0.15s;
}
.thread-input-bar input:focus { border-color: var(--accent); }
.thread-input-bar input::placeholder { color: var(--text-dim); }
.thread-input-bar button {
  padding: 6px 12px;
  background: var(--accent); border: none; border-radius: 8px;
  color: white; font-size: 12px; font-weight: 600;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.15s;
}
.thread-input-bar button:hover { background: var(--accent-hover); }

/* Typing indicator */
.typing-bar {
  padding: 0 20px 4px;
  font-size: 12px; color: var(--text-dim);
  min-height: 22px;
  font-style: italic;
}

/* Input bar */
.input-bar {
  padding: 10px 16px 16px;
  display: flex; gap: 10px; align-items: flex-end;
}
.input-wrapper {
  flex: 1; position: relative;
}
.input-wrapper textarea {
  width: 100%; padding: 12px 16px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; color: var(--text-bright);
  font-family: inherit; font-size: 14px; line-height: 1.5;
  outline: none; resize: none;
  min-height: 44px; max-height: 160px;
  transition: border-color 0.15s;
}
.input-wrapper textarea:focus { border-color: var(--accent); }
.input-wrapper textarea::placeholder { color: var(--text-dim); }
.send-btn {
  padding: 10px 20px; height: 44px;
  background: var(--accent); border: none; border-radius: 12px;
  color: white; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: background 0.15s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-hover); }

/* Footer */
.demo-footer {
  padding: 10px 20px; border-top: 1px solid var(--border);
  text-align: center; flex-shrink: 0;
}
.demo-footer-title {
  font-size: 13px; color: var(--text); font-weight: 600;
}
.demo-footer-title a {
  color: #FF3C00; text-decoration: none; font-weight: 600;
}
.demo-footer-links {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; font-size: 11px; color: var(--text-dim); margin-top: 4px;
}
.demo-footer-links a {
  color: var(--text-dim); text-decoration: none; font-weight: 500;
  transition: color 0.15s;
}
.demo-footer-links a:hover { color: var(--accent); }
.demo-footer-links .sep { color: var(--border); }
</style>
</head>
<body>

<!-- Name picker -->
<div class="name-overlay" id="nameOverlay">
  <div class="name-card">
    <h2>Join Group Chat</h2>
    <p>Pick a display name. Open this page in another browser window to join as someone else.</p>
    <input type="text" id="nameInput" placeholder="Your name..." maxlength="20" autofocus>
    <button onclick="joinChat()">Join</button>
  </div>
</div>

<!-- Main app -->
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Group Chat</span>
      <span class="sidebar-user" id="sidebarUser"></span>
    </div>
    <div class="room-section">Rooms</div>
    <div class="room-list" id="roomList"></div>
    <div class="presence-section">
      <div class="presence-header">Online — <span id="presenceCount">0</span></div>
      <div class="presence-list" id="presenceList"></div>
    </div>
  </div>
  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <span class="chat-header-hash">#</span>
      <span class="chat-header-name" id="chatHeaderName">general</span>
      <span class="chat-header-desc" id="chatHeaderDesc">General discussion</span>
      <span class="chat-header-spacer"></span>
      <button class="chat-header-btn generate" onclick="generateHistory()">Generate history</button>
      <button class="chat-header-btn clear" onclick="clearHistory()">Clear</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="typing-bar" id="typingBar"></div>
    <div class="input-bar">
      <div class="input-wrapper">
        <textarea id="msgInput" rows="1" placeholder="Message #general"></textarea>
      </div>
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="demo-footer">
      <div class="demo-footer-title">Powered by <a href="https://ably.com/docs/chat" target="_blank">Ably Chat</a></div>
      <div class="demo-footer-links">
        <a href="https://ably.com/docs/chat" target="_blank">Docs</a>
        <span class="sep">·</span>
        <a href="https://ably.com/docs/chat/rooms/messages" target="_blank">Messages</a>
        <span class="sep">·</span>
        <a href="https://ably.com/docs/chat/rooms/presence" target="_blank">Presence</a>
        <span class="sep">·</span>
        <a href="https://ably.com/docs/chat/rooms/typing" target="_blank">Typing</a>
        <span class="sep">·</span>
        <a href="https://ably.com/docs/chat/rooms/reactions" target="_blank">Reactions</a>
      </div>
    </div>
  </div>
</div>

<script>
const KEY = '74GMLQ.EAUWhQ:KsOte05eYk10UCBweQBwitSMO-mC-kAG9FH_9r2oxgc';

const ROOMS = [
  { id: 'general',      name: 'general',      desc: 'General discussion' },
  { id: 'introductions', name: 'introductions', desc: 'Say hi and introduce yourself' },
  { id: 'random',       name: 'random',       desc: 'Off-topic banter' },
  { id: 'help',         name: 'help',         desc: 'Ask questions and get help' },
  { id: 'showcase',     name: 'showcase',     desc: 'Show off what you built' },
];

const AVATAR_COLORS = [
  'linear-gradient(135deg, #6366f1, #8b5cf6)',
  'linear-gradient(135deg, #3b82f6, #2563eb)',
  'linear-gradient(135deg, #22c55e, #16a34a)',
  'linear-gradient(135deg, #f97316, #ea580c)',
  'linear-gradient(135deg, #ec4899, #db2777)',
  'linear-gradient(135deg, #14b8a6, #0d9488)',
  'linear-gradient(135deg, #eab308, #ca8a04)',
  'linear-gradient(135deg, #ef4444, #dc2626)',
];

const NAME_COLORS = ['#a5b4fc','#93c5fd','#86efac','#fdba74','#f9a8d4','#5eead4','#fde047','#fca5a5'];

function hashName(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function colorForName(name) {
  return AVATAR_COLORS[hashName(name) % AVATAR_COLORS.length];
}

function nameColor(name) {
  return NAME_COLORS[hashName(name) % NAME_COLORS.length];
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

const REACTION_EMOJIS = ['👍','❤️','😂','🎉','👀','🔥'];

let userName = '';
let chatClient = null;
let realtime = null;
let currentRoomId = 'general';
let activeRoom = null;
let activeSubscription = null;
let typingUnsub = null;
let presenceUnsub = null;
let reactionsChannel = null;
const unreadCounts = {};
const roomCache = {};
const reactionStore = {};
const threadStore = {};
const threadChannels = {};

// Auto-resize textarea
const msgInput = document.getElementById('msgInput');
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 160) + 'px';
});

// Name picker
document.getElementById('nameInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); joinChat(); }
});

async function joinChat() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }
  userName = name;

  document.getElementById('nameOverlay').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('sidebarUser').textContent = userName;
  document.title = userName + ' — Group Chat';

  realtime = new Ably.Realtime({ key: KEY, clientId: userName });
  const ChatClient = typeof AblyChat !== 'undefined' ? AblyChat.ChatClient : window.AblyChat.ChatClient;
  chatClient = new ChatClient(realtime);

  renderRoomList();
  await switchRoom('general');
}

function renderRoomList() {
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  ROOMS.forEach(r => {
    const div = document.createElement('div');
    div.className = 'room-item' + (r.id === currentRoomId ? ' active' : '');
    div.id = 'room-' + r.id;
    div.onclick = () => switchRoom(r.id);
    div.innerHTML = `<span class="room-hash">#</span><span>${escapeHtml(r.name)}</span><span class="room-unread" id="unread-${r.id}"></span>`;
    list.appendChild(div);
  });
}

async function switchRoom(roomId) {
  if (activeRoom) {
    if (activeSubscription && activeSubscription.unsubscribe) activeSubscription.unsubscribe();
    if (typingUnsub) { typingUnsub(); typingUnsub = null; }
    if (presenceUnsub) { presenceUnsub(); presenceUnsub = null; }
    if (reactionsChannel) { reactionsChannel.unsubscribe(); reactionsChannel = null; }
    Object.keys(threadChannels).forEach(k => {
      try { threadChannels[k].unsubscribe(); } catch (e) {}
      delete threadChannels[k];
    });
    try { await activeRoom.presence.leave(); } catch (e) {}
  }

  currentRoomId = roomId;
  unreadCounts[roomId] = 0;
  updateUnreadBadge(roomId);

  const info = ROOMS.find(r => r.id === roomId);
  document.getElementById('chatHeaderName').textContent = info.name;
  document.getElementById('chatHeaderDesc').textContent = info.desc;
  document.getElementById('msgInput').placeholder = 'Message #' + info.name;
  document.getElementById('typingBar').textContent = '';

  // Update active state in sidebar
  document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
  const roomEl = document.getElementById('room-' + roomId);
  if (roomEl) roomEl.classList.add('active');

  const msgsEl = document.getElementById('messages');
  msgsEl.innerHTML = '';

  const roomOptions = {
    presence: { enter: true },
    typing: { heartbeatThrottleMs: 1000 },
    occupancy: { enableEvents: true },
  };

  const roomName = 'group-chat-' + roomId;
  const room = await chatClient.rooms.get(roomName, roomOptions);
  await room.attach();
  activeRoom = room;

  await room.presence.enter({ name: userName });

  // Presence
  const presentMembers = new Map();
  function refreshPresence() {
    const list = document.getElementById('presenceList');
    list.innerHTML = '';
    presentMembers.forEach((data, clientId) => {
      const div = document.createElement('div');
      div.className = 'presence-user';
      div.innerHTML = `<span class="presence-dot"></span><span>${escapeHtml(clientId)}</span>`;
      list.appendChild(div);
    });
    document.getElementById('presenceCount').textContent = presentMembers.size;
  }
  try {
    const members = await room.presence.get();
    members.forEach(m => presentMembers.set(m.clientId, m.data));
    refreshPresence();
  } catch (e) {}

  const { unsubscribe: presUnsub } = room.presence.subscribe((event) => {
    if (event.action === 'leave') {
      presentMembers.delete(event.clientId);
    } else {
      presentMembers.set(event.clientId, event.data);
    }
    refreshPresence();
  });
  presenceUnsub = presUnsub;

  // Typing
  const { unsubscribe: typUnsub } = room.typing.subscribe((event) => {
    const typers = event.currentlyTyping || event.currentTypers;
    const set = typers && (typers.size !== undefined ? typers : new Set((typers || []).map(t => t.clientId || t)));
    if (!set) return;
    const others = [...set].filter(id => id !== userName);
    const bar = document.getElementById('typingBar');
    if (others.length === 0) {
      bar.textContent = '';
    } else if (others.length === 1) {
      bar.textContent = others[0] + ' is typing...';
    } else if (others.length === 2) {
      bar.textContent = others[0] + ' and ' + others[1] + ' are typing...';
    } else {
      bar.textContent = others.length + ' people are typing...';
    }
  });
  typingUnsub = typUnsub;

  // Reactions channel (plain Ably pub/sub for per-message reactions)
  reactionsChannel = realtime.channels.get('group-chat-' + roomId + '-reactions');
  reactionsChannel.subscribe('reaction', (msg) => {
    const { serial, emoji, add } = msg.data;
    const who = msg.clientId;
    if (!serial || !emoji) return;
    if (!reactionStore[serial]) reactionStore[serial] = {};
    if (!reactionStore[serial][emoji]) reactionStore[serial][emoji] = new Set();
    if (add) {
      reactionStore[serial][emoji].add(who);
    } else {
      reactionStore[serial][emoji].delete(who);
      if (reactionStore[serial][emoji].size === 0) delete reactionStore[serial][emoji];
    }
    renderReactions(serial);
  });

  function toggleReaction(serial, emoji) {
    if (!reactionStore[serial]) reactionStore[serial] = {};
    if (!reactionStore[serial][emoji]) reactionStore[serial][emoji] = new Set();
    const mine = reactionStore[serial][emoji].has(userName);
    reactionsChannel.publish('reaction', { serial, emoji, add: !mine });
  }

  function renderReactions(serial) {
    const container = document.querySelector('[data-serial="' + CSS.escape(serial) + '"] .msg-reactions');
    if (!container) return;
    container.innerHTML = '';
    const emojis = reactionStore[serial] || {};
    for (const [emoji, users] of Object.entries(emojis)) {
      if (users.size === 0) continue;
      const pill = document.createElement('span');
      pill.className = 'reaction-pill' + (users.has(userName) ? ' mine' : '');
      pill.innerHTML = `<span class="r-emoji">${emoji}</span><span class="r-count">${users.size}</span>`;
      pill.title = [...users].join(', ');
      pill.onclick = () => toggleReaction(serial, emoji);
      container.appendChild(pill);
    }
  }

  // ── Threads ──
  function getThreadChannelName(parentSerial) {
    return 'group-chat-' + roomId + '-thread-' + parentSerial.replace(/[^a-zA-Z0-9_\-]/g, '_');
  }

  function subscribeToThread(parentSerial) {
    if (threadChannels[parentSerial]) return;
    const chName = getThreadChannelName(parentSerial);
    const ch = realtime.channels.get(chName);
    ch.subscribe('reply', (msg) => {
      const { text } = msg.data;
      const reply = { clientId: msg.clientId, text, timestamp: msg.timestamp || Date.now() };
      if (!threadStore[parentSerial]) threadStore[parentSerial] = [];
      threadStore[parentSerial].push(reply);
      updateThreadSummary(parentSerial);
      appendThreadReply(parentSerial, reply);
    });
    threadChannels[parentSerial] = ch;
  }

  function updateThreadSummary(parentSerial) {
    const el = document.querySelector('[data-serial="' + CSS.escape(parentSerial) + '"] .thread-summary');
    if (!el) return;
    const replies = threadStore[parentSerial] || [];
    if (replies.length === 0) {
      el.classList.remove('has-replies');
      return;
    }
    el.classList.add('has-replies');
    el.querySelector('.thread-count').textContent = replies.length + (replies.length === 1 ? ' reply' : ' replies');
    el.querySelector('.thread-last').textContent = 'Last reply ' + formatTime(replies[replies.length - 1].timestamp);
  }

  function appendThreadReply(parentSerial, reply) {
    const container = document.querySelector('[data-serial="' + CSS.escape(parentSerial) + '"] .thread-replies');
    if (!container) return;
    const div = document.createElement('div');
    div.className = 'thread-reply';
    div.innerHTML = `<div class="thread-reply-avatar" style="background:${colorForName(reply.clientId)}">${escapeHtml(reply.clientId.charAt(0).toUpperCase())}</div>
      <div class="thread-reply-body">
        <span class="thread-reply-author" style="color:${nameColor(reply.clientId)}">${escapeHtml(reply.clientId)}</span><span class="thread-reply-time">${formatTime(reply.timestamp)}</span>
        <div class="thread-reply-text">${escapeHtml(reply.text)}</div>
      </div>`;
    container.appendChild(div);
  }

  async function toggleThread(parentSerial) {
    const group = document.querySelector('[data-serial="' + CSS.escape(parentSerial) + '"]');
    if (!group) return;
    const summary = group.querySelector('.thread-summary');
    const container = group.querySelector('.thread-container');
    const isOpen = container.classList.contains('open');

    if (isOpen) {
      container.classList.remove('open');
      summary.classList.remove('expanded');
      return;
    }

    container.classList.add('open');
    summary.classList.add('expanded');

    if (!threadChannels[parentSerial]) {
      subscribeToThread(parentSerial);
      try {
        const ch = threadChannels[parentSerial];
        const history = await ch.history({ limit: 50 });
        const items = history && history.items ? history.items : [];
        if (items.length > 0 && (!threadStore[parentSerial] || threadStore[parentSerial].length === 0)) {
          threadStore[parentSerial] = [];
          const ordered = items.slice().reverse();
          ordered.forEach(m => {
            const reply = { clientId: m.clientId, text: m.data.text, timestamp: m.timestamp || Date.now() };
            threadStore[parentSerial].push(reply);
            appendThreadReply(parentSerial, reply);
          });
          updateThreadSummary(parentSerial);
        }
      } catch (e) {
        console.warn('Thread history:', e);
      }
    }

    const input = container.querySelector('.thread-input');
    if (input) input.focus();
  }

  async function sendThreadReply(parentSerial) {
    const container = document.querySelector('[data-serial="' + CSS.escape(parentSerial) + '"] .thread-container');
    if (!container) return;
    const input = container.querySelector('.thread-input');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    if (!threadChannels[parentSerial]) subscribeToThread(parentSerial);
    try {
      await threadChannels[parentSerial].publish('reply', { text });
    } catch (e) {
      console.error('Thread reply error', e);
    }
  }

  // Messages: subscribe then load history
  let lastAuthor = '';

  function appendMessage(clientId, text, timestamp, serial) {
    const isNewAuthor = clientId !== lastAuthor;
    lastAuthor = clientId;

    const group = document.createElement('div');
    group.className = 'msg-group' + (isNewAuthor ? ' new-author' : '');
    if (serial) group.setAttribute('data-serial', serial);

    const avatarDiv = document.createElement('div');
    if (isNewAuthor) {
      avatarDiv.className = 'msg-avatar';
      avatarDiv.style.background = colorForName(clientId);
      avatarDiv.textContent = clientId.charAt(0).toUpperCase();
    } else {
      avatarDiv.className = 'msg-avatar hidden';
    }

    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'msg-body';

    if (isNewAuthor) {
      const authorRow = document.createElement('div');
      authorRow.className = 'msg-author-row';
      authorRow.innerHTML = `<span class="msg-author" style="color:${nameColor(clientId)}">${escapeHtml(clientId)}</span><span class="msg-time">${formatTime(timestamp)}</span>`;
      bodyDiv.appendChild(authorRow);
    }

    const textDiv = document.createElement('div');
    textDiv.className = 'msg-text';
    textDiv.textContent = text;
    bodyDiv.appendChild(textDiv);

    const reactionsDiv = document.createElement('div');
    reactionsDiv.className = 'msg-reactions';
    bodyDiv.appendChild(reactionsDiv);

    if (serial) {
      // Action bar (floating toolbar on hover)
      const actionBar = document.createElement('div');
      actionBar.className = 'msg-action-bar';

      // Reaction button + picker
      const reactionBtn = document.createElement('button');
      reactionBtn.className = 'msg-action-btn';
      reactionBtn.setAttribute('title', 'Add reaction');
      reactionBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6.25"/><path d="M5.5 9.5c.5.8 1.3 1.2 2.5 1.2s2-.4 2.5-1.2"/><circle cx="6" cy="6.5" r=".5" fill="currentColor" stroke="none"/><circle cx="10" cy="6.5" r=".5" fill="currentColor" stroke="none"/></svg>';
      const picker = document.createElement('div');
      picker.className = 'reaction-picker';
      REACTION_EMOJIS.forEach(emoji => {
        const btn = document.createElement('button');
        btn.textContent = emoji;
        btn.onclick = (e) => {
          e.stopPropagation();
          picker.classList.remove('open');
          toggleReaction(serial, emoji);
        };
        picker.appendChild(btn);
      });
      reactionBtn.onclick = (e) => {
        e.stopPropagation();
        document.querySelectorAll('.reaction-picker.open').forEach(p => p.classList.remove('open'));
        picker.classList.toggle('open');
      };
      actionBar.appendChild(picker);
      actionBar.appendChild(reactionBtn);

      // Thread reply button
      const threadBtn = document.createElement('button');
      threadBtn.className = 'msg-action-btn';
      threadBtn.setAttribute('title', 'Reply in thread');
      threadBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.75 3.25h10.5v7h-5.5L4.5 13V10.25H2.75z"/></svg>';
      threadBtn.onclick = (e) => {
        e.stopPropagation();
        const summary = group.querySelector('.thread-summary');
        if (!summary.classList.contains('has-replies')) {
          if (!threadStore[serial]) threadStore[serial] = [];
          summary.classList.add('has-replies');
          summary.querySelector('.thread-count').textContent = '0 replies';
          summary.querySelector('.thread-last').textContent = 'Start a thread';
        }
        toggleThread(serial);
      };
      actionBar.appendChild(threadBtn);

      bodyDiv.appendChild(actionBar);

      // Thread summary row
      const threadSummary = document.createElement('div');
      threadSummary.className = 'thread-summary';
      threadSummary.innerHTML = `<span class="thread-count"></span><span class="thread-last"></span><span class="thread-chevron">▼</span>`;
      threadSummary.onclick = () => toggleThread(serial);
      bodyDiv.appendChild(threadSummary);

      // Thread container (collapsed)
      const threadContainer = document.createElement('div');
      threadContainer.className = 'thread-container';
      threadContainer.innerHTML = `<div class="thread-replies"></div>
        <div class="thread-input-bar">
          <input class="thread-input" type="text" placeholder="Reply..." />
          <button onclick="return false;">Reply</button>
        </div>`;
      const threadInput = threadContainer.querySelector('.thread-input');
      const threadSendBtn = threadContainer.querySelector('.thread-input-bar button');
      threadSendBtn.onclick = () => sendThreadReply(serial);
      threadInput.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); sendThreadReply(serial); }
      });
      bodyDiv.appendChild(threadContainer);

      renderReactions(serial);
    }

    group.appendChild(avatarDiv);
    group.appendChild(bodyDiv);
    msgsEl.appendChild(group);
  }

  const sub = room.messages.subscribe((event) => {
    const msg = event.message;
    const action = msg.action || 'message.create';
    if (action !== 'message.create') return;

    if (roomId !== currentRoomId) {
      unreadCounts[roomId] = (unreadCounts[roomId] || 0) + 1;
      updateUnreadBadge(roomId);
      return;
    }
    appendMessage(msg.clientId, msg.text, msg.timestamp || Date.now(), msg.serial);
    scrollToBottom();
  });
  activeSubscription = sub;

  // History
  try {
    const histPromise = sub.historyBeforeSubscribe
      ? sub.historyBeforeSubscribe({ limit: 50 })
      : (room.messages.history && room.messages.history({ limit: 50 }));
    const result = histPromise ? await histPromise : null;
    const items = result && result.items ? result.items : [];
    if (items.length > 0) {
      lastAuthor = '';
      const ordered = items.slice().reverse();
      ordered.forEach(m => {
        if (m.action === 'message.delete') return;
        appendMessage(m.clientId, m.text || '', m.timestamp || Date.now(), m.serial);
      });
      scrollToBottom();
    }
  } catch (e) {
    console.warn('History load:', e);
  }

  window._appendMessage = appendMessage;
  window._resetLastAuthor = () => { lastAuthor = ''; };

  scrollToBottom();
  document.getElementById('msgInput').focus();
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function updateUnreadBadge(roomId) {
  const badge = document.getElementById('unread-' + roomId);
  if (!badge) return;
  const count = unreadCounts[roomId] || 0;
  badge.textContent = count;
  badge.classList.toggle('show', count > 0);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !activeRoom) return;
  input.value = '';
  input.style.height = 'auto';

  try {
    await activeRoom.messages.send({ text });
    await activeRoom.typing.stop();
  } catch (err) {
    console.error('Send error', err);
  }
  input.focus();
}

// ── Generate / Clear history ──
const DUMMY_NAMES = ['Sarah', 'Marcus', 'Priya', 'Alex', 'Jordan', 'Tomoko'];
const DUMMY_CONVO = [
  { from: 'Sarah',  text: 'Hey everyone! Please welcome our newest team member!' },
  { from: 'Marcus', text: 'Welcome to the team! Really glad to have you here 🎉' },
  { from: 'Priya',  text: 'Hi! Welcome aboard. Let me know if you need help getting set up.' },
  { from: 'Alex',   text: 'Welcome! The onboarding docs are pinned in #help if you need them.' },
  { from: 'Jordan', text: 'Great to have you! We usually do a standup at 10am if you want to join.' },
  { from: 'Tomoko', text: 'Welcome! I\'m on the frontend team — happy to do a walkthrough anytime.' },
  { from: 'Sarah',  text: 'Also, don\'t miss Friday demos — it\'s a great way to see what everyone\'s working on.' },
  { from: 'Marcus', text: 'And lunch is at 12:30. The ramen place around the corner is the team favourite 🍜' },
  { from: 'Priya',  text: 'Pro tip: check out #random for the important stuff (memes)' },
  { from: 'Alex',   text: 'Haha, priorities. But seriously, welcome again. It\'s a great team.' },
];

async function generateHistory() {
  if (!window._appendMessage) return;
  window._resetLastAuthor();
  const now = Date.now();
  DUMMY_CONVO.forEach((msg, i) => {
    const ts = now - (DUMMY_CONVO.length - i) * 45000;
    const fakeSerial = 'dummy-' + i + '-' + Date.now();
    window._appendMessage(msg.from, msg.text, ts, fakeSerial);
  });
  scrollToBottom();
}

function clearHistory() {
  document.getElementById('messages').innerHTML = '';
  if (window._resetLastAuthor) window._resetLastAuthor();
}

// Close reaction pickers on outside click
document.addEventListener('click', () => {
  document.querySelectorAll('.reaction-picker.open').forEach(p => p.classList.remove('open'));
});

// Typing keystroke on input
msgInput.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
    return;
  }
  if (activeRoom && e.key.length === 1) {
    try { await activeRoom.typing.keystroke(); } catch (e) {}
  }
});
</script>
